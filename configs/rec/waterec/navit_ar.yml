Global:
  device: gpu
  epoch_num: 20
  log_smooth_window: 20
  print_batch_step: 10
  output_dir: ./output/rec/waterec_r/navit_ar/
  save_epoch_step: [15, 1]
  # evaluation is run every 2000 iterations
  eval_batch_step: [0, 2000]
  eval_epoch_step: [0, 1]
  cal_metric_during_train: True
  pretrained_model: 
  checkpoints: 
  use_tensorboard: false
  infer_img:
  # for data or label process
  character_dict_path: &character_dict_path ./tools/utils/EN_symbol_dict.txt # 96en
  # ./tools/utils/ppocr_keys_v1.txt  # ch
  max_text_length: &max_text_length 25
  use_space_char: &use_space_char False
  max_seq_len: &max_seq_len 256
  min_seq_len: &min_seq_len 64
  save_res_path: ./output/rec/u14m/waterec_r/predicts.txt
  use_amp: True

Optimizer:
  name: AdamW
  lr: 0.00065 # for 4gpus bs256/gpu
  weight_decay: 0.05
  filter_bias_and_bn: True

LRScheduler:
  name: OneCycleLR
  warmup_epoch: 1.5 # pct_start 0.075*20 = 1.5ep
  cycle_momentum: False

Architecture:
  model_type: rec
  algorithm: NaViTNRTR
  in_channels: 3
  Transform:
  Encoder:
    name: NaViT_ROPE
    patch_size: [4, 4]
    embed_dim: 384
    depth: 12
    num_heads: 6
    mlp_ratio: 4
  Decoder:
    name: NaARDecoder
    beam_size: 0
    num_decoder_layers: 2
    nhead: 12
    max_len: *max_text_length


Loss:
  name: ARLoss

PostProcess:
  name: ARLabelDecode
  character_dict_path: *character_dict_path
  use_space_char: *use_space_char

Metric:
  name: RecMetric
  main_indicator: acc
  is_filter: True

Train:
  dataset:
    name: LMDBDataSet
    data_dir: ../WATER-R/
    transforms:
      - DecodeImagePIL: # load image
          img_mode: RGB
      - PARSeqAugPIL:
      - ARLabelEncode: # Class handling label
          character_dict_path: *character_dict_path
          use_space_char: *use_space_char
          max_text_length: *max_text_length
      - NaRecTVResize:
          patch_size: 4
          max_seq_len: *max_seq_len
          min_seq_len: *min_seq_len
      - KeepKeys:
          keep_keys: ['image', 'label', 'length'] # dataloader will return list in this order
  loader:
    collate_fn: NoCollator
    shuffle: True
    batch_size_per_card: 128
    drop_last: True
    num_workers: 4

Eval:
  dataset:
    name: LMDBDataSet
    data_dir: ../ic15_data/
    transforms:
      - DecodeImagePIL: # load image
          img_mode: RGB
      - ARLabelEncode: # Class handling label
          character_dict_path: *character_dict_path
          use_space_char: *use_space_char
          max_text_length: *max_text_length
      - NaRecTVResize:
          patch_size: 4
          max_seq_len: *max_seq_len
          min_seq_len: *min_seq_len
      - KeepKeys:
          keep_keys: ['image', 'label', 'length'] # dataloader will return list in this order
  loader:
    collate_fn: NoCollator
    shuffle: False
    drop_last: False
    batch_size_per_card: 128
    num_workers: 4
